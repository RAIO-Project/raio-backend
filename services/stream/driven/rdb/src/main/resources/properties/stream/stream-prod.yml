stream:
  flyway:
    create-schemas: true
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

app:
  storage:
    s3:
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      bucket: ${S3_BUCKET}
      public-base-url: ${S3_PUBLIC_BASE_URL}