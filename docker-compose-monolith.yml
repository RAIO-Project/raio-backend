version: "3"

services:
  demo_postgres14:
    image: postgres:14
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: raio
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - "5433:5432"
    restart: on-failure
    volumes:
      - sticky_volume_demo_postgres14:/var/lib/postgresql/data
      - ./db/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  demo_redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  demo_minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: on-failure
    volumes:
      - sticky_volume_demo_minio:/data
    networks:
      default:
        aliases:
          - demo-minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  demo_minio_init:
    image: minio/minio
    depends_on:
      demo_minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://demo-minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/raio-local &&
      mc anonymous set download local/raio-local
      "

  demo_prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    restart: on-failure
    volumes:
      - ./core/monitoring-core/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sticky_volume_demo_prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  demo_grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    restart: on-failure
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      demo_prometheus:
        condition: service_healthy
    volumes:
      - ./core/monitoring-core/grafana/provisioning:/etc/grafana/provisioning:ro
      - sticky_volume_demo_grafana:/var/lib/grafana

volumes:
  sticky_volume_demo_postgres14:
  sticky_volume_demo_minio:
  sticky_volume_demo_prometheus:
  sticky_volume_demo_grafana: